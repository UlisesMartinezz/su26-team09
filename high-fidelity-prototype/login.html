<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ClipzConnect Homepage</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <!--Navigation Bar-->
        <nav class="Nav-bar">
            <div class="nav-left">
                <img src="images/ClipzConnectLogo.jpg.jpeg" class="left-logo" alt="Logo">
            </div>

            <div class="nav-right">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                </ul>

                <img src="images/profileIcon.jpg" class="right-logo" alt="Profile_Icon">
            </div>
        </nav>

        <!-- LOGIN BOX -->
        <main>
            <div class="login-container">

                <div class="login-box">
                    <h2>Login</h2>
                    <p>Sign in to book your next appointment.</p>

                    <form>
                        <label>Email</label>
                        <input type="email" placeholder="Enter your email" required>

                        <label>Password</label>
                        <input type="password" placeholder="Enter your password" required>

                        <button type="submit">Login</button>
                    </form>

                    <p class="login-text">
                        Don’t have an account?
                        <a href="sign-up.html">Sign up</a>
                    </p>
                </div>

            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p class="footer-text">&copy; 2026 ClipzConnect. Created as an educational project.</p>
        </footer>
    </body>
</html>
