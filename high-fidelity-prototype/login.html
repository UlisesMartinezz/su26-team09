<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ClipzConnect - Sign In</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>

    <!-- ================= NAVBAR ================= -->
    <nav class="navbar">

        <div class="nav-left">
            <img src="images/ClipzConnectLogo.jpg.jpeg" class="logo" alt="Logo">
            <h2>ClipzConnect</h2>
        </div>

        <div class="nav-right">
            <a href="index.html">Home</a>
            <a href="sign-up.html">Create Account</a>
            <img src="images/profileIcon.jpg" class="profile-icon" alt="Profile">
        </div>

    </nav>

    <!-- ================= SIGN IN ================= -->

    <section class="signup-section">

        <div class="signup-card">

            <h1>Sign In</h1>

            <p>Select how you would like to sign in.</p>

            <!-- Account Type -->

            <div class="account-type">

                <label>
                    <input type="radio"
                        name="accountType"
                        value="customer"
                        checked>
                    Customer
                </label>

                <label>
                    <input type="radio"
                        name="accountType"
                        value="barber">
                    Barber
                </label>

            </div>

            <form id="loginForm">

                <input type="email" placeholder="Email Address">

                <input type="password" placeholder="Password">

                <button type="submit" class="create-account-btn">
                    Sign In
                </button>

                <p class="signin-text">
                    Don't have an account?
                    <a href="sign-up.html" class="signin-link">
                        Create Account
                    </a>
                </p>

            </form>

        </div>

    </section>

    <!-- ================= FOOTER ================= -->

    <footer>

        <p>&copy; 2026 ClipzConnect. All rights reserved.</p>

    </footer>

    <script>

    const customer = document.querySelector('input[value="customer"]');
    const barber = document.querySelector('input[value="barber"]');
    const loginForm = document.getElementById("loginForm");

    loginForm.addEventListener("submit", function(event){

        event.preventDefault();

        if(customer.checked){

            window.location.href = "customer-prototype/customerDashBoard.html";

        }
        else{

            window.location.href = "provider-prototype/providerDashboard.html";

        }

    });

    </script>

    </body>
</html>
