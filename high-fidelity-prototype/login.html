<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ClipzConnect - Login</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>

        <!-- ================= NAVBAR ================= -->
        <nav class="navbar">

            <div class="nav-left">
                <img src="images/ClipzConnectLogo.jpg.jpeg" class="logo" alt="Logo">
                <h2>ClipzConnect</h2>
            </div>

            <div class="nav-right">
                <a href="index.html">Home</a>
                <a href="sign-up.html">Sign Up</a>
                <img src="images/profileIcon.jpg" class="profile-icon" alt="Profile">
            </div>

        </nav>

        <!-- ================= LOGIN BOX ================= -->
        <main>

            <div class="signup-section">

                <div class="signup-card">

                    <h1>Sign In</h1>

                    <p>Welcome back! Choose how you want to sign in.</p>

                    <!-- Account Type Selection -->
                    <div class="account-type">

                        <label>
                            <input type="radio" name="accountType" value="customer" checked>
                            Customer
                        </label>

                        <label>
                            <input type="radio" name="accountType" value="barber">
                            Barber
                        </label>

                    </div>

                    <!-- Login Form -->
                    <form id="loginForm">

                        <input type="email" placeholder="Email Address">
                        <input type="password" placeholder="Password">

                        <button type="submit" class="create-account-btn">
                            Sign In
                        </button>

                        <p class="signin-text">
                            Don’t have an account?
                            <a href="sign-up.html" class="signin-link">Create Account</a>
                        </p>

                    </form>

                </div>

            </div>

        </main>

        <!-- ================= FOOTER ================= -->
        <footer>
            <p>&copy; 2026 ClipzConnect. Created as an educational project.</p>
        </footer>

        <script>
            document.getElementById("loginForm").addEventListener("submit", function (e) {
                e.preventDefault();

                // Get selected account type
                const accountType = document.querySelector('input[name="accountType"]:checked').value;

                // Optional: store type so dashboard can use it later
                localStorage.setItem("accountType", accountType);

                // Redirect based on selection
                if (accountType === "customer") {
                    window.location.href = "customer-prototype/customerDashBoard.html";
                } else if (accountType === "barber") {
                    window.location.href = "provider-prototype/providerDashboard.html";
                }
            });
            </script>

    </body>
</html>
