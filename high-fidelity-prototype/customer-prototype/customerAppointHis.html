<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">

    <body>

        <!-- ================= NAVBAR ================= -->
        <nav class="navbar">

            <div class="nav-right">

        <section class="section">

                <!-- Appointment Card -->
                <div class="history-card">

                    <h3>Chris Edger</h3>
                    <p><strong>Date:</strong> June 3, 2026</p>
                    <p><strong>Service:</strong> Haircut</p>

                    <div class="rating">
                        ⭐⭐⭐⭐☆
