<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ClipzConnect - Profile</title>
        <link rel="stylesheet" href="../styles.css">
    </head>

    <body>

        <!-- ================= NAVBAR ================= -->
        <nav class="navbar">

            <div class="nav-left">
                <img src="../images/ClipzConnectLogo.jpg.jpeg" class="logo" alt="Logo">
                <h2>ClipzConnect</h2>
            </div>

            <div class="nav-right">
                <a href="customerDashBoard.html">Dashboard</a>
                <a href="../index.html">Log Out</a>
                <img src="../images/profileIcon.jpg" class="profile-icon" alt="Profile">
            </div>

        </nav>

        <!-- ================= PROFILE HUB ================= -->

        <section class="profile-section">

            <div class="profile-card">

                <h1>My Profile</h1>
                <p>Update your personal information</p>

                <form>

                    <label>First Name</label>
                    <input type="text" value="Smith">

                    <label>Last Name</label>
                    <input type="text" value="Cramp">

                    <label>Email Address</label>
                    <input type="email" value="IDK@email.com">

                    <label>Phone Number</label>
                    <input type="tel" value="123-456-7890">

                    <label>Password</label>
                    <input type="password" value="">

                    <button type="submit">Save Changes</button>

                </form>

            </div>

        </section>

    </body>
</html>
